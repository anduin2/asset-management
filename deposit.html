<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日存款报价汇总 · 2026-07-07</title>
<style>
  /* ============ Design Tokens ============ */
  :root {
    --bg:        #f6f8fb;
    --bg-card:   #ffffff;
    --bg-soft:   #f1f5f9;
    --bg-dark:   #0f172a;
    --bg-darker: #0b1220;
    --line:      #e2e8f0;
    --line-soft: #eef2f7;
    --text:      #0f172a;
    --muted:     #64748b;
    --muted-2:   #94a3b8;
    --primary:   #2563eb;
    --primary-d: #1d4ed8;
    --primary-l: #dbeafe;
    --best:      #15803d;
    --best-bg:   #dcfce7;
    --warn:      #b45309;
    --warn-bg:   #fef3c7;
    --danger:    #b91c1c;
    --danger-bg: #fee2e2;
    --accent:    #7c3aed;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
    --shadow-md: 0 4px 12px rgba(15,23,42,.06), 0 1px 3px rgba(15,23,42,.04);
    --radius:    10px;
    --radius-sm: 6px;
    --mono: 'SF Mono','JetBrains Mono','Fira Code','Roboto Mono','Consolas',monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC','Hiragino Sans GB','Microsoft YaHei', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }
  a { color: var(--primary); text-decoration: none; }

  /* ============ Header ============ */
  header.app {
    background: linear-gradient(135deg, var(--bg-darker) 0%, #1e293b 100%);
    color: #f8fafc;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.06);
    position: sticky; top: 0; z-index: 50;
  }
  header.app .brand {
    display: flex; align-items: center; gap: 12px;
  }
  header.app .logo {
    width: 34px; height: 34px; border-radius: 8px;
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    display: grid; place-items: center;
    font-weight: 800; font-size: 16px;
  }
  header.app h1 {
    font-size: 16px; font-weight: 600; margin: 0;
    letter-spacing: 0.2px;
  }
  header.app .sub {
    color: #94a3b8; font-size: 12px; font-weight: 400;
  }
  header.app .spacer { flex: 1; }
  header.app .header-actions {
    display: flex; align-items: center; gap: 8px;
  }
  .date-picker {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: #e2e8f0;
    padding: 6px 10px;
    font-size: 13px;
    font-family: var(--mono);
    cursor: pointer;
  }
  .date-picker:hover { background: rgba(255,255,255,0.10); }
  .btn {
    border: 1px solid var(--line);
    background: var(--bg-card);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .btn:hover { border-color: #cbd5e1; background: var(--bg-soft); }
  .btn.primary {
    background: var(--primary); border-color: var(--primary); color: #fff;
  }
  .btn.primary:hover { background: var(--primary-d); border-color: var(--primary-d); }
  .btn.ghost-dark {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.12);
    color: #e2e8f0;
  }
  .btn.ghost-dark:hover { background: rgba(255,255,255,0.12); }
  .btn.danger { color: var(--danger); border-color: #fecaca; background: #fff; }
  .btn.danger:hover { background: var(--danger-bg); }
  .btn.sm { padding: 4px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ============ Tabs ============ */
  nav.tabs {
    background: var(--bg-card);
    border-bottom: 1px solid var(--line);
    padding: 0 28px;
    display: flex;
    gap: 4px;
    position: sticky; top: 62px; z-index: 40;
  }
  nav.tabs button {
    background: none; border: none;
    padding: 14px 18px;
    font-size: 14px; font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    display: flex; align-items: center; gap: 6px;
  }
  nav.tabs button:hover { color: var(--text); }
  nav.tabs button.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }
  nav.tabs .nav-spacer { flex: 1; }
  nav.tabs .nav-info {
    align-self: center;
    font-size: 12px; color: var(--muted);
    font-family: var(--mono);
    margin-right: 4px;
  }

  /* ============ Layout ============ */
  main { padding: 24px 28px 80px; }
  section.view { display: none; }
  section.view.active { display: block; }

  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  @media (max-width: 1100px) {
    .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 700px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    main { padding: 16px; }
    nav.tabs { padding: 0 12px; overflow-x: auto; }
    header.app { padding: 12px 16px; flex-wrap: wrap; }
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line-soft);
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(180deg, #fafbfc 0%, #ffffff 100%);
  }
  .card-header h3 {
    margin: 0; font-size: 14px; font-weight: 600;
    color: var(--text);
    letter-spacing: 0.1px;
  }
  .card-header .sub {
    color: var(--muted); font-size: 12px; font-weight: 400;
  }
  .card-header .spacer { flex: 1; }
  .card-body { padding: 18px; }
  .card-body.flush { padding: 0; }

  /* ── 报价新鲜度/沿用标记 ── */
  .quote-age {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 500; white-space: nowrap;
    padding: 2px 10px; border-radius: 12px;
  }
  .quote-age.age-fresh   { background: #e6f7e6; color: #1a7a1a; }
  .quote-age.age-recent  { background: #fff8e1; color: #b8860b; }
  .quote-age.age-stale   { background: #f5f5f5; color: #999; }
  .quote-age.age-missing { background: #fef0f0; color: #c0392b; }

  /* 表格单元格中小号版本 */
  .quote-age-sm {
    font-size: 11px; font-weight: 500; white-space: nowrap;
    padding: 1px 6px; border-radius: 10px; text-align: center;
  }
  .quote-age-sm.age-fresh   { background: #e6f7e6; color: #1a7a1a; }
  .quote-age-sm.age-recent  { background: #fff8e1; color: #b8860b; }
  .quote-age-sm.age-stale   { background: #f5f5f5; color: #999; }
  .quote-age-sm.age-missing { background: #fef0f0; color: #c0392b; }

  /* ============ KPI / Highlight cards ============ */
  .kpi {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow-sm);
    position: relative; overflow: hidden;
  }
  .kpi .label {
    font-size: 12px; color: var(--muted); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.6px;
  }
  .kpi .value {
    font-family: var(--mono);
    font-size: 28px; font-weight: 700;
    color: var(--text);
    margin-top: 4px;
  }
  .kpi .value.best { color: var(--best); }
  .kpi .meta {
    font-size: 12px; color: var(--muted); margin-top: 4px;
  }
  .kpi .corner {
    position: absolute; right: 14px; top: 14px;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 12px;
    background: var(--primary-l); color: var(--primary-d);
  }

  /* ============ Pill toggles ============ */
  .pills {
    display: inline-flex;
    background: var(--bg-soft);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .pills button {
    border: none; background: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px; font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
  }
  .pills button.active {
    background: #ffffff;
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  /* ============ Rate Matrix Table ============ */
  table.rate-matrix {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.rate-matrix th, table.rate-matrix td {
    padding: 10px 12px;
    text-align: right;
    border-bottom: 1px solid var(--line-soft);
    white-space: nowrap;
  }
  table.rate-matrix th:first-child, table.rate-matrix td:first-child {
    text-align: left;
    position: sticky; left: 0;
    background: var(--bg-card);
    z-index: 1;
  }
  table.rate-matrix thead th {
    background: var(--bg-soft);
    color: var(--muted);
    font-weight: 600;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 1px solid var(--line);
  }
  table.rate-matrix thead th:first-child { background: var(--bg-soft); }
  table.rate-matrix tbody tr:hover td { background: #fbfdff; }
  table.rate-matrix tbody tr:hover td:first-child { background: #fbfdff; }
  table.rate-matrix .rate {
    font-family: var(--mono); font-weight: 500;
    color: var(--text);
  }
  table.rate-matrix .rate.empty {
    color: var(--muted-2);
    font-weight: 400;
  }
  table.rate-matrix .rate.best {
    color: var(--best);
    font-weight: 700;
    background: var(--best-bg);
    border-radius: 4px;
  }
  table.rate-matrix .rate.tied {
    background: #ecfeff;
    color: #0e7490;
    font-weight: 600;
    border-radius: 4px;
  }
  table.rate-matrix .bank-label {
    display: flex; align-items: center; gap: 8px;
  }
  table.rate-matrix .bank-tag {
    width: 4px; height: 16px; border-radius: 2px;
    background: var(--primary);
  }
  table.rate-matrix .bank-name {
    font-weight: 500;
    font-size: 13px;
  }
  table.rate-matrix .bank-short {
    color: var(--muted); font-size: 11px;
  }
  table.rate-matrix .row-stat td {
    background: #f8fafc !important;
    font-weight: 600;
    color: var(--muted);
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-top: 2px solid var(--line);
  }
  table.rate-matrix .row-stat td:first-child { background: #f8fafc !important; }
  table.rate-matrix .row-stat .rate { color: var(--muted); font-weight: 600; }
  table.rate-matrix .row-stat .rate.best { color: var(--best); background: var(--best-bg); }

  /* Editable cell */
  table.rate-matrix td.editable { cursor: text; }
  table.rate-matrix td.editable:hover { outline: 2px solid var(--primary-l); outline-offset: -2px; }
  table.rate-matrix td.editing {
    padding: 0;
  }
  table.rate-matrix td.editing input {
    width: 100%;
    border: 2px solid var(--primary);
    background: #fff;
    padding: 8px 10px;
    font: inherit;
    font-family: var(--mono);
    text-align: right;
    outline: none;
    border-radius: 4px;
  }

  /* Scroll wrapper for wide tables */
  .table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ============ Bank cards (Banks tab) ============ */
  .bank-card { margin-bottom: 18px; }
  .bank-card .badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
    background: var(--primary-l); color: var(--primary-d);
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .bank-card .badge.warn { background: var(--warn-bg); color: var(--warn); }
  .bank-card .badge.danger { background: var(--danger-bg); color: var(--danger); }
  .bank-card .meta-row {
    display: flex; flex-wrap: wrap; gap: 16px;
    color: var(--muted); font-size: 12.5px;
    padding-bottom: 12px;
  }
  .bank-card .meta-row .item {
    display: flex; align-items: center; gap: 6px;
  }
  .bank-card .meta-row .item .k { color: var(--muted-2); }
  .bank-card .notes {
    background: var(--warn-bg);
    color: var(--warn);
    border-radius: 6px;
    padding: 10px 14px;
    margin: 10px 0;
    font-size: 12.5px;
    border-left: 3px solid var(--warn);
  }
  .bank-card .fx-block {
    margin-top: 12px;
    padding: 12px 14px;
    background: var(--bg-soft);
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .bank-card .fx-block .pair {
    font-family: var(--mono);
    margin-right: 16px;
    display: inline-flex; gap: 8px;
  }
  .bank-card .fx-block .pair .k { color: var(--muted); margin-right: 4px; }

  /* ============ Decision panel ============ */
  .decision {
    border-left: 3px solid var(--primary);
    padding: 8px 14px;
    margin-bottom: 8px;
    background: #fbfdff;
    border-radius: 0 6px 6px 0;
    font-size: 13px;
  }
  .decision.warn { border-color: var(--warn); background: #fffbeb; }
  .decision.good { border-color: var(--best); background: #f0fdf4; }
  .decision .title { font-weight: 600; margin-right: 6px; }

  /* ============ Import view ============ */
  .import-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 1000px) { .import-grid { grid-template-columns: 1fr; } }
  textarea.paste-area {
    width: 100%;
    min-height: 360px;
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.55;
    resize: vertical;
    background: #fafbfc;
  }
  textarea.paste-area:focus { outline: none; border-color: var(--primary); background: #fff; }
  .form-row { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; margin-bottom: 10px; }
  .form-row .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px; }
  .form-row label {
    font-size: 12px; color: var(--muted); font-weight: 500;
  }
  .form-row input, .form-row select {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
    background: #fff;
    font-family: inherit;
  }
  .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--primary); }
  .preview-empty {
    border: 2px dashed var(--line);
    border-radius: var(--radius);
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }

  /* ============ Trend chart ============ */
  .chart-wrap {
    background: var(--bg-card);
    padding: 8px 4px 4px;
    border-radius: var(--radius-sm);
  }
  svg.chart { width: 100%; display: block; }
  svg.chart .grid line { stroke: var(--line-soft); stroke-width: 1; }
  svg.chart .axis text { font: 11px var(--mono); fill: var(--muted); }
  svg.chart .axis line { stroke: var(--line); stroke-width: 1; }
  svg.chart .series path { fill: none; stroke-width: 2; }
  svg.chart .series circle { stroke: #fff; stroke-width: 1.5; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px; padding: 0 8px; }
  .legend .item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; }
  .legend .item.muted { opacity: 0.35; }
  .legend .swatch { width: 12px; height: 3px; border-radius: 2px; }

  /* ============ Toast / status ============ */
  .toast-host {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 1000;
  }
  .toast {
    background: #0f172a; color: #fff;
    padding: 10px 16px; border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    font-size: 13px;
    animation: toastIn 0.2s ease-out;
    max-width: 360px;
  }
  .toast.ok { background: #166534; }
  .toast.err { background: #991b1b; }
  @keyframes toastIn { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* ============ Modal ============ */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.4);
    display: grid; place-items: center;
    z-index: 100;
  }
  .modal {
    background: #fff;
    border-radius: var(--radius);
    width: min(640px, 92vw);
    max-height: 86vh;
    overflow: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.18);
  }
  .modal h3 { margin: 0 0 8px; font-size: 16px; }
  .modal .pad { padding: 20px 22px; }

  /* ============ Empty state ============ */
  .empty {
    padding: 48px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
  .empty .icon {
    font-size: 32px; margin-bottom: 8px; opacity: 0.5;
  }

  /* misc */
  .mono { font-family: var(--mono); }
  .muted { color: var(--muted); }
  .small { font-size: 12px; }
  .tag-best {
    display: inline-block;
    background: var(--best-bg); color: var(--best);
    padding: 1px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 700;
    margin-left: 4px;
    vertical-align: middle;
  }
  .delta-up { color: var(--best); font-family: var(--mono); font-size: 11px; }
  .delta-down { color: var(--danger); font-family: var(--mono); font-size: 11px; }
  .delta-flat { color: var(--muted); font-family: var(--mono); font-size: 11px; }
  hr.sep { border: none; border-top: 1px solid var(--line-soft); margin: 14px 0; }
  details > summary { cursor: pointer; user-select: none; }
  details > summary:hover { color: var(--primary); }

  /* Print */
  @media print {
    header.app, nav.tabs, .header-actions, .no-print { display: none !important; }
    body { background: #fff; }
    .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
    main { padding: 0; }
  }
</style>
</head>
<body>
<script src="auth.js"></script>
<script src="auto_refresh.js"></script>

<header class="app">
  <div class="brand">
    <div class="logo">¥</div>
    <div>
      <h1>每日存款报价汇总 · 历史数据</h1>
      <div class="sub">Daily Deposit Rate Summary · 2026-07-07 08:57</div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="header-actions">
    <input type="date" id="dateSelector" class="date-picker">
    <button class="btn ghost-dark" id="btnSnapshot" title="保存当前数据为今日快照">💾 保存快照</button>
    <button class="btn ghost-dark" id="btnExport" title="导出整个数据库">⤴️ 导出</button>
    <button class="btn ghost-dark" id="btnImportFile" title="从 JSON 文件导入">⤵️ 导入</button>
  </div>
</header>

<nav class="tabs">
  <button data-view="dashboard" class="active">📊 概览</button>
  <button data-view="trend">📈 趋势</button>
  <button data-view="banks">🏦 银行</button>
  <button data-view="import">📥 录入</button>
  <button data-view="manage">⚙️ 管理</button>
  <span class="nav-spacer"></span>
  <span class="nav-info" id="navStatus"></span>
</nav>

<main>
  <section id="view-dashboard" class="view active"></section>
  <section id="view-banks" class="view"></section>
  <section id="view-import" class="view"></section>
  <section id="view-trend" class="view"></section>
  <section id="view-manage" class="view"></section>
</main>

<div id="modalHost"></div>
<div class="toast-host" id="toastHost"></div>

    aliases: [/^1\s*m(onths?|th)?$/i, /^一[个個]?月$/, /^30d$/i] },
  { code: '2M',  days: 60,  label: '2 个月 / 2 Months',
    aliases: [/^2\s*m(onths?|th)?$/i, /^[两兩二][个個]?月$/, /^60d$/i] },
  { code: '3M',  days: 90,  label: '3 个月 / 3 Months',
    aliases: [/^3\s*m(onths?|th)?$/i, /^三[个個]?月$/, /^90d$/i] },
  { code: '4M',  days: 120, label: '4 个月 / 4 Months',
    aliases: [/^4\s*m(onths?|th)?$/i, /^四[个個]?月$/] },
  { code: '5M',  days: 150, label: '5 个月 / 5 Months',
    aliases: [/^5\s*m(onths?|th)?$/i, /^五[个個]?月$/] },
  { code: '6M',  days: 180, label: '6 个月 / 6 Months',
    aliases: [/^6\s*m(onths?|th)?$/i, /^六[个個]?月$/, /^半年$/] },
  { code: '9M',  days: 270, label: '9 个月 / 9 Months',
    aliases: [/^9\s*m(onths?|th)?$/i, /^九[个個]?月$/] },
  { code: '12M', days: 365, label: '12 个月 / 1 Year',
    aliases: [/^12\s*m(onths?|th)?$/i, /^1\s*y(ear)?s?$/i, /^十二[个個]?月$/, /^一年$/, /^365d$/i] },
];

// 币种规范化（CNH / CNY / RMB / 人民币 都映射到 CNH 显示，但保留原始标记便于排错）
const CURRENCIES = [
  { code: 'USD', label: '美元 USD', symbol: '$',
    aliases: [/^usd$/i, /^美[元金]$/, /^美元$/] },
  { code: 'HKD', label: '港币 HKD', symbol: 'HK$',
    aliases: [/^hkd$/i, /^港[币幣元]$/] },
  { code: 'CNH', label: '人民币 CNH', symbol: '¥',
    aliases: [/^cnh$/i, /^cny$/i, /^rmb$/i, /^人民[币幣]$/, /^[离離]岸人民[币幣]$/] },
];

const CURRENCY_CODES = CURRENCIES.map(c => c.code);

// 银行配色（递增分配，可在 manage 页面修改）
const PALETTE = [
  '#2563eb','#dc2626','#7c3aed','#059669','#db2777',
  '#ea580c','#0891b2','#65a30d','#9333ea','#0284c7',
];

/* ===================== 2. 工具函数 ===================== */

const $  = (sel, el = document) => el.querySelector(sel);
const $$ = (sel, el = document) => Array.from(el.querySelectorAll(sel));
const el = (tag, props = {}, children = []) => {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'style' && typeof v === 'object') Object.assign(node.style, v);
    else if (k === 'class' || k === 'className') node.className = v;
    else if (k === 'html') node.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'dataset' && typeof v === 'object') Object.assign(node.dataset, v);
    else if (v !== null && v !== undefined && v !== false) node.setAttribute(k, v);
  }
  for (const child of [].concat(children)) {
    if (child === null || child === undefined || child === false) continue;
    node.appendChild(typeof child === 'string' ? document.createTextNode(child) : child);
  }
  return node;
};

const fmtPct = (rate, digits = 2) => {
  if (rate === null || rate === undefined || rate === '' || isNaN(rate)) return '';
  return (Number(rate) * 100).toFixed(digits) + '%';
};

const parsePct = (text) => {
  if (text === null || text === undefined) return null;
  const s = String(text).trim();
  if (!s) return null;
  if (/^(tbc|n\/?a|--|—|-)$/i.test(s)) return null;
  // remove % and any trailing letters
  const m = s.match(/(-?\d+(?:[.,]\d+)?)/);
  if (!m) return null;
  let n = parseFloat(m[1].replace(',', '.'));
  if (isNaN(n)) return null;
  // 如果原文带 % 或绝对值 > 1，按百分号处理；否则视为已是小数（如 0.0265）
  if (/%/.test(s) || Math.abs(n) > 1) n = n / 100;
  return n;
};

const todayISO = () => {
  const d = new Date();
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
};

const slug = (s) => String(s || '').trim().toLowerCase()
  .replace(/[^\w\u4e00-\u9fa5]+/g, '-')
  .replace(/^-+|-+$/g, '') || ('x' + Math.random().toString(36).slice(2, 8));

const uid = () => 'q' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);

const matchTenor = (raw) => {
  const s = String(raw || '').trim();
  if (!s) return null;
  for (const t of TENORS) {
    for (const a of t.aliases) {
      if (a instanceof RegExp ? a.test(s) : a === s) return t.code;
    }
  }
  return null;
};
const matchCurrency = (raw) => {
  const s = String(raw || '').trim();
  if (!s) return null;
  for (const c of CURRENCIES) {
    for (const a of c.aliases) {
      if (a instanceof RegExp ? a.test(s) : a === s) return c.code;
    }
  }
  return null;
};

const stripHtml = (html) => {
  if (!html) return '';
  const s = String(html);
  // 简易 HTML → text，保留结构换行
  return s
    .replace(/<(script|style)[^>]*>[\s\S]*?<\/\1>/gi, '')
    .replace(/<\s*br\s*\/?>/gi, '\n')
    .replace(/<\/\s*(p|div|tr|li|h[1-6])\s*>/gi, '\n')
    .replace(/<\/\s*td\s*>/gi, '\t')
    .replace(/<[^>]+>/g, '')
    .replace(/&nbsp;/g, ' ')
    .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
    .replace(/&quot;/g, '"').replace(/&#39;/g, "'")
    .replace(/[ \t]+\n/g, '\n')
    .replace(/\n{3,}/g, '\n\n');
};

/* ===================== 3. 持久化 ===================== */

const STORAGE_KEY = 'deposit_rate_data_v1';

const Storage = {
  load() {
    if (PRELOADED_DATA && Object.keys(PRELOADED_DATA.snapshots||{}).length) {
      return JSON.parse(JSON.stringify(PRELOADED_DATA));
    }
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return Storage.defaultState();
      const data = JSON.parse(raw);
      if (!data.version) data.version = 1;
      data.banks = data.banks || {};
      data.snapshots = data.snapshots || {};
      return data;
    } catch (e) {
      console.error('Storage.load failed', e);
      return Storage.defaultState();
    }
  },
  save(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  },
  defaultState() {
    return {
      version: 1,
      banks: {},     // bankId -> { id, name, shortName, color, region, contacts, notes }
      snapshots: {}, // 'YYYY-MM-DD' -> { date, quotes: [Quote], updatedAt }
    };
  },
};

/** Quote 结构（每个 bank 当天一条）：
 *  {
 *    id, bankId, bankName, shortName,
 *    receivedAt: ISO string,
 *    source: 'email' | 'manual' | 'import',
 *    sourceRef: '邮件主题 / 文件名',
 *    rates:   [ { tenor: 'O/N', currency: 'USD', rate: 0.035, raw: '3.50%' } ],
 *    fxRates: [ { pair: 'USD/CNH', side: 'mid'|'bankBuy'|'bankSell', rate: 6.7531 } ],
 *    constraints: [ '...' ],   // 业务约束 / footnote
 *    contacts: [ { name, email, phone } ],
 *    notes: '...',
 *  }
 */

let STATE = Storage.load();
let UI = {
  view: 'dashboard',
  date: (typeof PRELOADED_LATEST_DATE !== "undefined" ? PRELOADED_LATEST_DATE : todayISO()),
  currency: 'USD',
  trendTenor: '3M',
  trendMuted: new Set(),
};

function ensureSnapshot(date) {
  if (!STATE.snapshots[date]) {
    STATE.snapshots[date] = { date, quotes: [], updatedAt: new Date().toISOString() };
  }
  return STATE.snapshots[date];
}

function ensureBank(meta) {
  const id = meta.id || slug(meta.shortName || meta.name);
  if (!STATE.banks[id]) {
    const palette = PALETTE[Object.keys(STATE.banks).length % PALETTE.length];
    STATE.banks[id] = {
      id,
      name: meta.name || meta.shortName || id,
      shortName: meta.shortName || meta.name || id,
      color: meta.color || palette,
      region: meta.region || '',
      contacts: meta.contacts || [],
      notes: meta.notes || '',
    };
  } else {
    // 合并增量字段（不覆盖既有 color 等）
    const b = STATE.banks[id];
    if (meta.name && !b.name) b.name = meta.name;
    if (meta.shortName && !b.shortName) b.shortName = meta.shortName;
    if (meta.region && !b.region) b.region = meta.region;
  }
  return STATE.banks[id];
}

function persist() { Storage.save(STATE); }

function getCurrentSnapshot() { return STATE.snapshots[UI.date] || null; }
function getQuotesByBank(date) {
  const snap = STATE.snapshots[date];
  if (!snap) return [];
  // 每家银行只保留最新一条（receivedAt 最大）
  const byBank = {};
  for (const q of snap.quotes) {
    if (!byBank[q.bankId] || (q.receivedAt || '') > (byBank[q.bankId].receivedAt || '')) {
      byBank[q.bankId] = q;
    }
  }
  return Object.values(byBank);
}

function rateOf(quote, currency, tenor) {
  if (!quote) return null;
  const r = (quote.rates || []).find(x => x.currency === currency && x.tenor === tenor);
  return r ? r.rate : null;
}

function setRate(quote, currency, tenor, rate, raw) {
  quote.rates = quote.rates || [];
  let r = quote.rates.find(x => x.currency === currency && x.tenor === tenor);
  if (!r) {
    r = { currency, tenor, rate: null, raw: '' };
    quote.rates.push(r);
  }
  r.rate = rate;
  if (raw !== undefined) r.raw = raw;
}

/* ===================== 4. 智能解析器 ===================== */
/**
 * 设计目标：不为每家银行写死 parser，而是用启发式提取「币种列 × 期限行」的矩阵。
 * 适配新格式时：用户粘贴正文，能自动识别 80% 以上的常见表格；解析不准的地方
 * 在「录入」页面里逐格手动修改即可。
 *
 * 算法概要：
 *   1) 文本预处理：HTML→text，全角空格归一化，把「数字 + %」或「3.78」与
 *      tenor 关键词（"1M", "一个月"…）切成 token 行。
 *   2) 在所有「行」中找候选标题行（含至少 2 个币种关键字），其后面的若干行
 *      若以 tenor 关键字开头并跟数字，即视作矩阵行。
 *   3) 同时单独扫 USD/CNH、USD/HKD 等 FX 行，提取双边或中间价。
 *   4) 失败时返回空矩阵，UI 仍允许手动新增。
 */

const Parser = {
  /** 主入口：text 可以是 plain 也可以是 HTML */
  parse(text, hints = {}) {
    const plain = /<\w+/.test(text) ? stripHtml(text) : String(text);
    const lines = plain.split(/\r?\n/).map(l => l.replace(/\u3000/g, ' ').trim()).filter(Boolean);

    const result = {
      bankGuess: this.guessBank(plain, hints),
      receivedGuess: hints.receivedAt || this.guessDateTime(plain),
      rates: this.extractRateMatrix(lines),
      fxRates: this.extractFx(plain),
      constraints: this.extractConstraints(plain),
      contacts: this.extractContacts(plain),
      raw: plain,
    };
    return result;
  },

  /* ----- 银行识别（基于关键词 + 已有 banks 字典） ----- */
  guessBank(text, hints) {
    const known = Object.values(STATE.banks);
    const hay = text.toLowerCase();
    for (const b of known) {
      const probe = (b.shortName || b.name || '').toLowerCase();
      if (probe && probe.length >= 2 && hay.includes(probe.toLowerCase())) {
        return { id: b.id, name: b.name, shortName: b.shortName };
      }
    }
    // 内置识别提示（可扩展）
    const hits = [
      [/china construction bank.*?(asia|hong kong|hk)|建设银行|建行/i, '中国建设银行 (Asia/HK)', 'CCB'],
      [/hua\s*xia\s*bank|华夏银行/i, '华夏银行香港分行', 'HuaXia HK'],
      [/bank\s*of\s*shanghai|上海银行/i, '上海银行(香港)', 'BoSHK'],
      [/spd\s*bank|浦发|spdb/i, '浦发银行香港分行', 'SPDB HK'],
      [/bangkok\s*bank|盘谷银行|曼谷银行/i, '曼谷银行', 'BBL'],
      [/hsbc/i, 'HSBC', 'HSBC'],
      [/standard\s*chartered|渣打/i, '渣打银行', 'SCB'],
      [/citi(bank)?/i, 'Citibank', 'Citi'],
      [/icbc|工商银行|工银/i, '工商银行', 'ICBC'],
      [/bank of china|中银|中国银行/i, '中国银行', 'BOC'],
      [/dbs/i, 'DBS', 'DBS'],
      [/ocbc/i, 'OCBC', 'OCBC'],
      [/cmb|招商银行|招行/i, '招商银行', 'CMB'],
      [/communications|交通银行|交行/i, '交通银行', 'BoCom'],
    ];
    for (const [re, name, short] of hits) {
      if (re.test(text)) return { name, shortName: short };
    }
    if (hints.subject) {
      // 主题里取最像银行名的部分
      return { name: hints.subject.slice(0, 40), shortName: hints.subject.slice(0, 16) };
    }
    return { name: '', shortName: '' };
  },

  guessDateTime(text) {
    // 形如 2026-06-17 / 2026/6/17 / 26年6月17日 / 17 Jun 2026
    const tries = [
      /(20\d{2})[-\/年.](\d{1,2})[-\/月.](\d{1,2})/,
      /(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\s+(20\d{2})/i,
    ];
    for (const re of tries) {
      const m = text.match(re);
      if (m) {
        if (/\d{4}/.test(m[1])) {
          return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
        } else {
          const months = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
          const mn = months[m[2].toLowerCase().slice(0,3)];
          return `${m[3]}-${String(mn).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
        }
      }
    }
    return '';
  },

  /* ----- 报价矩阵抽取（核心） ----- */
  extractRateMatrix(lines) {
    const rates = [];
    // 把所有出现的 currency token 抽出，记录其在哪一行哪个位置
    // 思路 A：合并相邻短行（很多邮件 1 列 1 行）
    // 思路 B：按行扫描，遇到「tenor 词 + 多个百分号/数字」即解析
    // 我们组合两者：先做行内匹配，再做"块"匹配。

    // ------- 方式 1：单行内 tenor + N 个百分数 -------
    const lineRe = /(O\/?N|overnight|隔夜|\d+\s*(?:W|周|wk)|\d+\s*(?:M|month|months|个月|個月)|\d+\s*(?:Y|year|years)|一周|两周|二周|三周|半年|一年|[一二两三四五六七八九十]{1,2}个月|[一二两三四五六七八九十]{1,2}個月)/i;

    // 当前候选币种序列（标题行确定后即套用到后续 tenor 行）
    let curCurrencies = null;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      // 1) 候选币种标题行：含 ≥ 2 个币种 token，且自己不是数据行
      const hits = this.findCurrencyTokens(line);
      if (hits.length >= 2 && !/%/.test(line)) {
        curCurrencies = hits.map(h => h.code);
        continue;
      }
      // 2) 行内 tenor + 数字
      const tenorMatch = line.match(lineRe);
      if (!tenorMatch) continue;
      const tenor = matchTenor(tenorMatch[0]);
      if (!tenor) continue;

      // 取该行中所有数字 token（含 % 或裸数字）
      let rest = line.slice(tenorMatch.index + tenorMatch[0].length);
      const nums = this.extractNumbers(rest);
      if (nums.length === 0) {
        // 数据可能在下一行（极偶尔的换行格式）
        const next = lines[i + 1] || '';
        const nums2 = this.extractNumbers(next);
        if (nums2.length) {
          this.applyNums(rates, tenor, curCurrencies, nums2);
          i++;
        }
        continue;
      }
      this.applyNums(rates, tenor, curCurrencies, nums);
    }

    // ------- 方式 2：分块（每行只一个 token） -------
    if (rates.length === 0) {
      // 收集 tokens 序列：CURR / TENOR / NUM
      const tokens = [];
      for (const line of lines) {
        const c = matchCurrency(line);
        const t = matchTenor(line);
        const numMatch = line.match(/^-?\d+(?:[.,]\d+)?\s*%?$/);
        if (c) tokens.push({ k: 'C', v: c });
        else if (t) tokens.push({ k: 'T', v: t });
        else if (numMatch) tokens.push({ k: 'N', v: parsePct(line), raw: line });
      }
      // 在 token 流里找连续 currency 块，再找 tenor + N currency 数字 的循环
      let header = [];
      let i = 0;
      while (i < tokens.length) {
        if (tokens[i].k === 'C') {
          // 累计 header
          header = [];
          while (i < tokens.length && tokens[i].k === 'C') { header.push(tokens[i].v); i++; }
          continue;
        }
        if (tokens[i].k === 'T' && header.length) {
          const tenor = tokens[i].v; i++;
          for (let j = 0; j < header.length && i < tokens.length; j++) {
            if (tokens[i].k === 'N') {
              rates.push({ tenor, currency: header[j], rate: tokens[i].v, raw: tokens[i].raw });
              i++;
            } else {
              break;
            }
          }
          continue;
        }
        i++;
      }
    }
    // 去重 (tenor+currency)：保留最后一次（更可能为正确）
    const map = new Map();
    for (const r of rates) {
      if (r.tenor && r.currency) map.set(r.tenor + '|' + r.currency, r);
    }
    return Array.from(map.values());
  },

  applyNums(rates, tenor, currencies, nums) {
    // currencies 可能为空（无标题行），那就只能记 unknown
    if (!currencies || currencies.length === 0) return;
    const n = Math.min(currencies.length, nums.length);
    for (let i = 0; i < n; i++) {
      rates.push({
        tenor,
        currency: currencies[i],
        rate: nums[i].rate,
        raw: nums[i].raw,
      });
    }
  },

  findCurrencyTokens(line) {
    // 同一行可能写 "Tenor HKD USD CNH" 或 "HKDUSDCNY"
    const out = [];
    // 优先按空白切
    const tokens = line.split(/[\s\|｜,，]+/).filter(Boolean);
    for (const t of tokens) {
      const c = matchCurrency(t);
      if (c) out.push({ code: c, raw: t });
    }
    if (out.length >= 2) return out;
    // 否则尝试粘连：HKDUSDCNY
    const compactRe = /(USD|HKD|CNH|CNY|RMB)/gi;
    let m;
    const seen = new Set();
    while ((m = compactRe.exec(line))) {
      const c = matchCurrency(m[0]);
      if (c && !seen.has(c)) { seen.add(c); out.push({ code: c, raw: m[0] }); }
    }
    return out;
  },

  extractNumbers(s) {
    // 抽出所有 "数字%" 或 "数字"（含 TBC / N/A → null）
    const out = [];
    const re = /(TBC|N\/?A|--|—)|(-?\d{1,3}(?:[,.\s]\d{1,3})?(?:\.\d+)?\s*%?)/gi;
    let m;
    while ((m = re.exec(s))) {
      const raw = m[0].trim();
      if (m[1]) out.push({ rate: null, raw });
      else if (m[2]) out.push({ rate: parsePct(m[2]), raw });
    }
    return out;
  },

  /* ----- FX 抽取 ----- */
  extractFx(text) {
    const out = [];
    // 1) "USD/CNH  6.7531  6.7551"  双边
    const reTwo = /(USD|HKD|CNH|CNY)\s*\/\s*(USD|HKD|CNH|CNY)\D{0,30}?(\d+\.\d+)[\s\u00A0]+(\d+\.\d+)/gi;
    let m;
    while ((m = reTwo.exec(text))) {
      const pair = `${m[1].toUpperCase()}/${m[2].toUpperCase()}`.replace('CNY','CNH');
      out.push({ pair, side: 'bankBuy', rate: parseFloat(m[3]) });
      out.push({ pair, side: 'bankSell', rate: parseFloat(m[4]) });
    }
    // 2) "美元/港币 7.832"
    const reCN = /(美[元金]|港[币幣]|人民[币幣])[（(]?[卖賣买買]?[）)]?\s*[/／]\s*[（(]?[卖賣买買]?[）)]?(美[元金]|港[币幣]|人民[币幣])\s*([0-9.]+)/g;
    while ((m = reCN.exec(text))) {
      const map = { '美元':'USD','美金':'USD','港币':'HKD','港幣':'HKD','人民币':'CNH','人民幣':'CNH' };
      const a = map[m[1].replace(/[卖賣买買]/g,'')] || map[m[1]];
      const b = map[m[2]];
      if (a && b) out.push({ pair: `${a}/${b}`, side: 'mid', rate: parseFloat(m[3]) });
    }
    // 3) "USD/CNH 6.7531"  单边/中间价
    const reOne = /(USD|HKD|CNH|CNY)\s*\/\s*(USD|HKD|CNH|CNY)\D{0,15}?(\d+\.\d{3,5})\b/gi;
    while ((m = reOne.exec(text))) {
      const pair = `${m[1].toUpperCase()}/${m[2].toUpperCase()}`.replace('CNY','CNH');
      // 已被 reTwo 覆盖的不再加
      const exists = out.some(x => x.pair === pair && Math.abs(x.rate - parseFloat(m[3])) < 1e-6);
      if (!exists) out.push({ pair, side: 'mid', rate: parseFloat(m[3]) });
    }
    // 去重
    const dedup = [];
    const seen = new Set();
    for (const f of out) {
      const k = `${f.pair}|${f.side}|${f.rate}`;
      if (seen.has(k)) continue;
      seen.add(k); dedup.push(f);
    }
    return dedup;
  },

  /* ----- 业务约束（footnote 等） ----- */
  extractConstraints(text) {
    const out = [];
    // 中文「注 1：」「注：」「注 2：」
    const reCN = /注\s*\d*\s*[:：]\s*([^\n]+)/g;
    let m;
    while ((m = reCN.exec(text))) {
      const s = m[1].trim();
      if (s.length > 4 && s.length < 200) out.push(s);
    }
    // 英文 "Note:" / "Please note"
    const reEN = /(?:please\s+)?note[\s:]+([^\n]+)/gi;
    while ((m = reEN.exec(text))) {
      const s = m[1].trim();
      if (s.length > 6 && s.length < 200 && !/^that\b/i.test(s)) out.push(s);
    }
    return out.slice(0, 6);
  },

  /* ----- 联系人（弱抽取） ----- */
  extractContacts(text) {
    const out = [];
    const reEmail = /([a-z0-9._-]+@[a-z0-9.-]+\.[a-z]{2,})/gi;
    const seen = new Set();
    let m;
    while ((m = reEmail.exec(text))) {
      const email = m[1];
      if (seen.has(email)) continue;
      seen.add(email);
      // 邮箱前 30 字符里找姓名（粗略）
      const before = text.slice(Math.max(0, m.index - 60), m.index);
      const nameMatch = before.match(/([A-Z][a-z]+\s+[A-Z][a-z]+|[一-龥]{2,4}(?:女士|先生|小姐)?)\s*[（(]?\s*$/);
      out.push({ name: nameMatch ? nameMatch[1] : '', email, phone: '' });
    }
    // 电话（弱）
    const rePhone = /\b(?:\+?852[-\s]?)?\d{4}[-\s]?\d{4}\b/g;
    while ((m = rePhone.exec(text))) {
      // 把电话补到最近的没电话的联系人上
      const tel = m[0];
      const c = out.find(c => !c.phone);
      if (c) c.phone = tel;
    }
    return out.slice(0, 6);
  },
};

/** 找该 (currency, tenor) 下最优报价（支持并列） */
function bestRateAt(quotes, currency, tenor) {
  let best = null;
  let tieCount = 0;
  for (const q of quotes) {
    const r = rateOf(q, currency, tenor);
    if (r === null) continue;
    if (best === null || r > best.rate + 1e-9) {
      best = { rate: r, bankId: q.bankId, bankName: q.bankName, bankShort: q.shortName };
      tieCount = 1;
    } else if (Math.abs(r - best.rate) < 1e-9) {
      tieCount++;
    }
  }
  if (best) best.tieCount = tieCount;
  return best;
}

function buildMatrixCard(quotes, currency) {
  const tenorsUsed = TENORS.filter(t => quotes.some(q => rateOf(q, currency, t.code) !== null));
  const cols = tenorsUsed.length ? tenorsUsed : TENORS.filter(t => ['1M','3M','6M','12M'].includes(t.code));

  const card = el('div', { class: 'card' });
  card.appendChild(el('div', { class: 'card-header' }, [
    el('h3', {}, `比价矩阵 · ${currency}`),
    el('span', { class: 'sub' }, `共 ${quotes.length} 家银行 · 单元格双击可手动修改`),
    el('span', { class: 'spacer' }),
    el('span', { class: 'sub mono' }, '🟢 = 当列最优'),
  ]));

  const wrap = el('div', { class: 'table-scroll' });
  const tbl = el('table', { class: 'rate-matrix' });

  // 表头
  const trH = el('tr', {}, [
    el('th', {}, '银行 / Bank'),
    ...cols.map(t => el('th', {}, t.code)),
    el('th', {}, '更新时间'),
  ]);
  tbl.appendChild(el('thead', {}, trH));

  // 计算每列最大值
  const maxByCol = cols.map(t => {
    let max = -Infinity;
    for (const q of quotes) {
      const r = rateOf(q, currency, t.code);
      if (r !== null && r > max) max = r;
    }
    return max === -Infinity ? null : max;
  });

  const tbody = el('tbody');
  // 排序：当列总分最高的 / 名称
  const ranked = quotes.slice().sort((a, b) => (a.shortName || a.bankName).localeCompare(b.shortName || b.bankName));
  for (const q of ranked) {
    const tr = el('tr');
    const bank = STATE.banks[q.bankId] || {};
    const color = bank.color || '#2563eb';
    tr.appendChild(el('td', {}, [
      el('div', { class: 'bank-label' }, [
        el('span', { class: 'bank-tag', style: { background: color } }),
        el('div', {}, [
          el('div', { class: 'bank-name' }, q.shortName || q.bankName),
          el('div', { class: 'bank-short' }, q.bankName),
        ]),
      ]),
    ]));
    cols.forEach((t, idx) => {
      const r = rateOf(q, currency, t.code);
      const cls = ['rate', 'editable'];
      if (r === null) cls.push('empty');
      else if (maxByCol[idx] !== null && Math.abs(r - maxByCol[idx]) < 1e-9) cls.push('best');
      const td = el('td', {
        class: cls.join(' '),
        dataset: { quote: q.id, currency, tenor: t.code },
        ondblclick: (e) => startEditCell(e.currentTarget, q.id, currency, t.code),
        title: `${q.bankName} · ${t.code} · ${currency}`,
      }, r === null ? '—' : fmtPct(r));
      tr.appendChild(td);
    });
    tr.appendChild(el('td', { class: 'quote-age-sm ' + quoteAgeClass(q, UI.date) }, quoteAgeShort(q, UI.date)));
    tbody.appendChild(tr);
  }

  // ---- 统计行：HIGH / AVG / LOW ----
  const stats = ['HIGH', 'AVG', 'LOW'];
  for (const stat of stats) {
    const tr = el('tr', { class: 'row-stat' });
    tr.appendChild(el('td', {}, stat));
    cols.forEach((t, idx) => {
      const vals = quotes.map(q => rateOf(q, currency, t.code)).filter(v => v !== null);
      let v;
      if (!vals.length) v = null;
      else if (stat === 'HIGH') v = Math.max(...vals);
      else if (stat === 'LOW') v = Math.min(...vals);
      else v = vals.reduce((a, b) => a + b, 0) / vals.length;
      tr.appendChild(el('td', { class: 'rate' + (stat === 'HIGH' && v !== null ? ' best' : '') }, v === null ? '—' : fmtPct(v)));
    });
    tr.appendChild(el('td', {}, ''));
    tbody.appendChild(tr);
  }

  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
  card.appendChild(wrap);
  return card;
}

function startEditCell(td, quoteId, currency, tenor) {
  const snap = getCurrentSnapshot();
  if (!snap) return;
  const q = snap.quotes.find(x => x.id === quoteId);
  if (!q) return;
  const cur = rateOf(q, currency, tenor);
  td.classList.add('editing');
  td.classList.remove('best', 'empty');
  td.innerHTML = '';
  const input = el('input', {
    type: 'text',
    value: cur === null ? '' : (cur * 100).toFixed(3),
    placeholder: '如 3.45 或 3.45% 或留空清除',
  });
  td.appendChild(input);
  input.focus();
  input.select();
  const commit = () => {
    const raw = input.value.trim();
    let rate;
    if (raw === '' || /^(tbc|n\/?a|--)$/i.test(raw)) rate = null;
    else rate = parsePct(raw);
    setRate(q, currency, tenor, rate, raw);
    snap.updatedAt = new Date().toISOString();
    persist();
    renderCurrent();
    toast(`${q.shortName || q.bankName} · ${tenor} ${currency} 已更新为 ${rate === null ? '空' : fmtPct(rate)}`, 'ok');
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { td.classList.remove('editing'); renderCurrent(); }
  });
}

function buildFxCard(quotes) {
  const card = el('div', { class: 'card' });
  card.appendChild(el('div', { class: 'card-header' }, [el('h3', {}, '💱 FX 参考价'), el('span', { class: 'sub' }, '今日各家披露的汇率')]));
  const body = el('div', { class: 'card-body' });

  const all = [];
  for (const q of quotes) for (const f of (q.fxRates || [])) all.push({ ...f, bank: q.shortName || q.bankName, color: (STATE.banks[q.bankId]||{}).color });
  if (!all.length) {
    body.appendChild(el('div', { class: 'muted small' }, '今日各家邮件中暂未识别到 FX 报价。'));
  } else {
    // 按 pair 分组
    const groups = {};
    for (const f of all) (groups[f.pair] = groups[f.pair] || []).push(f);
    for (const [pair, items] of Object.entries(groups)) {
      const row = el('div', { style: { padding: '8px 0', borderBottom: '1px solid var(--line-soft)' } }, [
        el('div', { class: 'mono', style: { fontWeight: 600, marginBottom: '4px' } }, pair),
        el('div', {}, items.map(f => el('span', { class: 'pair small mono', style: { display: 'inline-block', marginRight: '12px', color: f.color } },
          [el('span', { class: 'k muted' }, f.side === 'mid' ? 'Mid' : f.side === 'bankBuy' ? 'Buy' : 'Sell'), f.rate.toFixed(4), el('span', { class: 'k muted' }, ' @ ' + f.bank)]
        ))),
      ]);
      body.appendChild(row);
    }
  }
  card.appendChild(body);
  return card;
}

function buildInsightCard(quotes, currency) {
  const card = el('div', { class: 'card' });
  card.appendChild(el('div', { class: 'card-header' }, [el('h3', {}, '🎯 决策建议'), el('span', { class: 'sub' }, '基于今日数据的启发式提示')]));
  const body = el('div', { class: 'card-body' });

  const tips = generateInsights(quotes, currency);
  if (!tips.length) {
    body.appendChild(el('div', { class: 'muted small' }, '当前数据不足以生成建议。'));
  } else {
    for (const t of tips) {
      body.appendChild(el('div', { class: 'decision ' + (t.level || '') }, [
        el('span', { class: 'title' }, t.title),
        el('span', {}, t.text),
      ]));
    }
  }
  card.appendChild(body);
  return card;
}

function generateInsights(quotes, currency) {
  const tips = [];
  // 1) 长端最优
  for (const tenor of ['12M', '6M', '3M']) {
    const best = bestRateAt(quotes, currency, tenor);
    if (best) {
      tips.push({
        level: 'good',
        title: `${tenor} 最优`,
        text: `${best.bankShort || best.bankName} ${fmtPct(best.rate)}` + (best.tieCount > 1 ? ` · 与另 ${best.tieCount - 1} 家并列` : ''),
      });
      break;
    }
  }
  // 2) 横向价差
  const target = '3M';
  const ratesT = quotes.map(q => ({ q, r: rateOf(q, currency, target) })).filter(x => x.r !== null);
  if (ratesT.length >= 2) {
    const max = ratesT.reduce((p, c) => c.r > p.r ? c : p);
    const min = ratesT.reduce((p, c) => c.r < p.r ? c : p);
    const spread = Math.round((max.r - min.r) * 10000);
    if (spread >= 10) {
      tips.push({
        level: 'warn',
        title: `${target} 价差`,
        text: `最高 ${max.q.shortName || max.q.bankName} ${fmtPct(max.r)}，最低 ${min.q.shortName || min.q.bankName} ${fmtPct(min.r)}，跨行价差 ${spread}bp，优先选高息。`,
      });
    }
  }
  // 3) 缺数据提示
  const stale = quotes.filter(q => (q.rates || []).every(r => r.rate === null));
  if (stale.length) {
    tips.push({
      level: 'warn',
      title: '待补录',
      text: `${stale.map(q => q.shortName || q.bankName).join('、')} 当前未识别到有效利率，可能因附件未解析；请到「录入」页面手动补录。`,
    });
  }
  return tips;
}

function previousDate(dateStr) {

function buildConstraintsCard(quotes) {

  for (const q of quotes) {

      el('span', {}, it.text),

  card.appendChild(body);
  return card;
}

  card.appendChild(el('div', { class: 'card-header' }, [

/* ── 报价新鲜度 ── */
function quoteAgeLabel(q, viewDate) {
  const qd = q.quoteDate || '';
  if (!qd) return (q.receivedAt || '').replace('T', ' ').slice(0, 10);
  const days = daysBetween(qd, viewDate);
  const label = days === 0 ? `今日报价 · ${qd}` : `沿用 · ${qd}`;
  if (days > 0) {
    return `${label}（${days}天前）`;
  }
  return label;
}
function quoteAgeShort(q, viewDate) {
  const qd = q.quoteDate || '';
  if (!qd) return (q.receivedAt || '').replace('T', ' ').slice(5, 10);
  const days = daysBetween(qd, viewDate);
  if (days === 0) return '今日';
  if (days === 1) return `1天前 · ${qd.slice(5)}`;
  return `${days}天前 · ${qd.slice(5)}`;
}
function quoteAgeClass(q, viewDate) {
  const qd = q.quoteDate || '';
  if (!qd) return 'age-missing';
  const days = daysBetween(qd, viewDate);
  if (days === 0) return 'age-fresh';
  if (days <= 3) return 'age-recent';
  return 'age-stale';
}
function daysBetween(a, b) {
  if (!a || !b) return 0;
  const da = new Date(a), db = new Date(b);
  return Math.round((db - da) / 864e5);
}

function deleteQuote(qid) {
  if (!confirm('确认删除此报价？该操作仅删除当日数据，不影响历史快照。')) return;

    if (preview.constraints.length) q.constraints = Array.from(new Set([...(q.constraints || []), ...preview.constraints]));

    snap.updatedAt = new Date().toISOString();
    persist();
    toast(`已保存 ${bank.shortName} 当日报价`, 'ok');
    setView('dashboard');

          el('select', { id: 'trendTenorSel', style: { padding: '6px 10px', borderRadius: '6px', border: '1px solid #e2e8f0', fontSize: '13px' } },
            ['O/N', '1W', '2W', '1M', '2M', '3M', '6M', '9M', '12M'].map(t => el('option', { value: t }, t))
          ),
        ]),
        el('label', { style: { display: 'flex', alignItems: 'center', gap: '6px', fontSize: '13px' } }, [
          el('span', { style: { color: '#64748b' } }, '币种：'),
          el('select', { id: 'trendCcySel', style: { padding: '6px 10px', borderRadius: '6px', border: '1px solid #e2e8f0', fontSize: '13px' } },
            CURRENCY_CODES.map(c => el('option', { value: c }, c))
          ),
        ]),
        el('button', { class: 'btn primary sm', id: 'trendAddBtn' }, '+ 添加曲线'),
        el('button', { class: 'btn sm', id: 'trendClearBtn', style: { marginLeft: 'auto' } }, '清空全部'),
      ]),
      // 曲线标签区
      el('div', { id: 'trendChips', style: { display: 'flex', gap: '8px', flexWrap: 'wrap', minHeight: '32px', marginBottom: '12px' } }),
      // 图表区
      el('div', { id: 'trendChartWrap', style: { minHeight: '280px' } },
        el('div', { class: 'empty', style: { padding: '40px', textAlign: 'center' } }, '选择银行 + 期限 + 币种，点「添加曲线」叠加显示')
      ),
    ]),
  ]);
  root.appendChild(card);

  // 设置默认值
  $('#trendTenorSel').value = '3M';
  $('#trendCcySel').value = 'USD';

  // 绑定事件
  $('#trendAddBtn').onclick = addTrendLine;
  $('#trendClearBtn').onclick = () => {
    trendLines.length = 0;
    renderTrendContent();
  };

  // 渲染已有曲线
  renderTrendContent();
}

function addTrendLine() {
  const bankId = $('#trendBankSel').value;
  const tenor = $('#trendTenorSel').value;
  const ccy = $('#trendCcySel').value;

  if (!bankId || !tenor || !ccy) return;

  // 去重
  const exists = trendLines.find(L => L.bankId === bankId && L.tenor === tenor && L.ccy === ccy);
  if (exists) {
    showToast('该曲线已添加', 'warn');
    return;
  }

  // 分配颜色
  const color = pickTrendColor(trendLines.length);
  trendLines.push({ bankId, tenor, ccy, color });
  renderTrendContent();
}

function removeTrendLine(idx) {
  trendLines.splice(idx, 1);
  // 重新分配颜色
  trendLines.forEach((L, i) => L.color = pickTrendColor(i));
  renderTrendContent();
}

function pickTrendColor(idx) {
  const colors = ['#2563eb', '#dc2626', '#059669', '#7c3aed', '#db2777', '#ea580c', '#0891b2', '#65a30d', '#0284c7', '#9333ea'];
  return colors[idx % colors.length];
}

function renderTrendContent() {
  const dates = Object.keys(STATE.snapshots).sort();
  const wrap = $('#trendChartWrap');
  const chips = $('#trendChips');
  const subtitle = $('#trendSubtitle');

  // 渲染标签
  if (trendLines.length === 0) {
    chips.innerHTML = '';
    wrap.innerHTML = '';
    wrap.appendChild(el('div', { class: 'empty', style: { padding: '40px', textAlign: 'center' } }, '选择银行 + 期限 + 币种，点「添加曲线」叠加显示'));
    subtitle.textContent = `数据范围 ${dates[0]} ~ ${dates[dates.length - 1]} · 共 ${dates.length} 天`;
    return;
  }

  // 渲染曲线标签
  chips.innerHTML = '';
  trendLines.forEach((L, i) => {
    const bankName = (STATE.banks[L.bankId] || {}).shortName || L.bankId;
    chips.appendChild(el('span', {
      style: {
        display: 'inline-flex', alignItems: 'center', gap: '6px',
        padding: '4px 10px', borderRadius: '16px', fontSize: '12px',
        background: '#f1f5f9', border: '1px solid #e2e8f0',
      }
    }, [
      el('span', { style: { width: '12px', height: '3px', borderRadius: '2px', background: L.color } }),
      el('span', {}, `${bankName} · ${L.tenor} · ${L.ccy}`),
      el('button', {
        style: { border: 'none', background: 'none', cursor: 'pointer', padding: '0 4px', fontSize: '14px', color: '#94a3b8' },
        onclick: () => removeTrendLine(i)
      }, '×'),
    ]));
  });

  subtitle.textContent = `共 ${trendLines.length} 条曲线`;

  // 绘制图表
  wrap.innerHTML = '';
  const chart = drawTrendChart(dates, trendLines);
  wrap.appendChild(chart);
}

function drawTrendChart(dates, lines) {
  const W = 800, H = 280, PL = 55, PR = 20, PT = 20, PB = 40;
  
  // 收集所有数据点计算Y轴范围
  let allY = [];
  lines.forEach(L => {
    for (const d of dates) {
      const quotes = getQuotesByBank(d);
      const q = quotes.find(q => q.bankId === L.bankId);
      if (q) {
        const r = rateOf(q, L.ccy, L.tenor);
        if (r !== null) allY.push(r);
      }
    }
  });

  if (allY.length === 0) {
    return el('div', { class: 'empty', style: { padding: '40px', textAlign: 'center' } }, '当前曲线无有效数据');
  }

  const yMin = Math.max(0, Math.min(...allY) - 0.001);
  const yMax = Math.max(...allY) + 0.001;
  
  const xScale = (i) => PL + (i / Math.max(dates.length - 1, 1)) * (W - PL - PR);
  const yScale = (v) => PT + (1 - (v - yMin) / Math.max(yMax - yMin, 1e-9)) * (H - PT - PB);

  const svg = elNS('svg', { 
    class: 'chart', 
    viewBox: `0 0 ${W} ${H}`, 
    style: { width: '100%', height: H + 'px' }
  });

  // 网格线
  const gridG = elNS('g', { class: 'grid' });
  const ticks = 5;
  for (let k = 0; k <= ticks; k++) {
    const v = yMin + (yMax - yMin) * (k / ticks);
    const yp = yScale(v);
    gridG.appendChild(elNS('line', { x1: PL, x2: W - PR, y1: yp, y2: yp, stroke: '#f1f5f9', 'stroke-width': 1 }));
    gridG.appendChild(elNS('text', { x: PL - 8, y: yp + 4, 'text-anchor': 'end', fill: '#94a3b8', 'font-size': '11', 'font-family': 'var(--mono)' }, fmtPct(v, 2)));
  }
  svg.appendChild(gridG);

  // X轴
  const ax = elNS('g', { class: 'axis' });
  ax.appendChild(elNS('line', { x1: PL, x2: W - PR, y1: H - PB, y2: H - PB, stroke: '#e2e8f0' }));
  const stride = Math.max(1, Math.ceil(dates.length / 10));
  dates.forEach((d, i) => {
    if (i % stride !== 0 && i !== dates.length - 1) return;
    const x = xScale(i);
    ax.appendChild(elNS('text', { x, y: H - PB + 18, 'text-anchor': 'middle', fill: '#64748b', 'font-size': '11', 'font-family': 'var(--mono)' }, d.slice(5)));
  });
  svg.appendChild(ax);

  // 绘制每条曲线
  lines.forEach(L => {
    const color = L.color;
    const points = [];
    
    for (let i = 0; i < dates.length; i++) {
      const d = dates[i];
      const quotes = getQuotesByBank(d);
      const q = quotes.find(q => q.bankId === L.bankId);
      if (q) {
        const r = rateOf(q, L.ccy, L.tenor);
        if (r !== null) {
          points.push({ x: i, y: r });
        }
      }
    }

    if (points.length === 0) return;

    // 折线
    const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xScale(p.x)} ${yScale(p.y)}`).join(' ');
    svg.appendChild(elNS('path', { d: pathD, stroke: color, 'stroke-width': 2, fill: 'none', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));

    // 数据点
    points.forEach(p => {
      const c = elNS('circle', { cx: xScale(p.x), cy: yScale(p.y), r: 4, fill: color, stroke: '#fff', 'stroke-width': 1.5, style: 'cursor: pointer' });
      const bankName = (STATE.banks[L.bankId] || {}).shortName || L.bankId;
      c.appendChild(elNS('title', {}, `${bankName} · ${L.tenor} · ${L.ccy}\n${dates[p.x]}: ${fmtPct(p.y)}`));
      svg.appendChild(c);
    });
  });

  return svg;
}

/** 历史走势折线图（Dashboard 内嵌）：dates 为日期数组，series 为 [{bankId, bankName, shortName, points:[{x:date,y:rate}]}] */
function drawLineChart(dates, series) {
  const W = 800, H = 280, PL = 55, PR = 20, PT = 20, PB = 40;
  const xs = dates;
  const ys = series.flatMap(s => s.points.map(p => p.y));
  const yMin = Math.max(0, Math.min(...ys) - 0.001);
  const yMax = Math.max(...ys) + 0.001;
  const xScale = (i) => PL + (i / Math.max(xs.length - 1, 1)) * (W - PL - PR);
  const yScale = (v) => PT + (1 - (v - yMin) / Math.max(yMax - yMin, 1e-9)) * (H - PT - PB);

  const container = el('div', { style: { position: 'relative' } });
  const tooltip = el('div', {
    id: 'trendTooltip',
    style: { position: 'fixed', background: 'rgba(15,23,42,0.95)', color: '#fff', padding: '10px 14px', borderRadius: '6px', fontSize: '12px', pointerEvents: 'none', opacity: '0', transition: 'opacity 0.15s', zIndex: '1000', maxWidth: '220px', display: 'none' }
  });
  container.appendChild(tooltip);

  const svg = elNS('svg', { class: 'chart', viewBox: `0 0 ${W} ${H}`, style: { width: '100%', height: '280px' } });

  // 网格
  const gridG = elNS('g', { class: 'grid' });
  const ticks = 5;
  for (let k = 0; k <= ticks; k++) {
    const v = yMin + (yMax - yMin) * (k / ticks);
    const yp = yScale(v);
    gridG.appendChild(elNS('line', { x1: PL, x2: W - PR, y1: yp, y2: yp, stroke: '#e2e8f0', 'stroke-width': k === ticks ? 1.5 : 0.5, 'stroke-dasharray': k === ticks ? 'none' : '4,4' }));
    gridG.appendChild(elNS('text', { x: PL - 10, y: yp + 4, 'text-anchor': 'end', fill: '#64748b', 'font-size': '11', 'font-family': 'var(--mono)' }, fmtPct(v, 2)));
  }
  svg.appendChild(gridG);

  // X轴 + 日期标签
  const ax = elNS('g', { class: 'axis' });
  ax.appendChild(elNS('line', { x1: PL, x2: W - PR, y1: H - PB, y2: H - PB, stroke: '#cbd5e1', 'stroke-width': 1.5 }));
  const stride = Math.max(1, Math.ceil(xs.length / 10));
  xs.forEach((d, i) => {
    if (i % stride !== 0 && i !== xs.length - 1) return;
    const x = xScale(i);
    ax.appendChild(elNS('line', { x1: x, x2: x, y1: H - PB, y2: H - PB + 5, stroke: '#cbd5e1' }));
    ax.appendChild(elNS('text', { x, y: H - PB + 20, 'text-anchor': 'middle', fill: '#475569', 'font-size': '11', 'font-family': 'var(--mono)' }, d.slice(5)));
  });
  svg.appendChild(ax);

  // 构建日期索引
  const idx = xs.reduce((m, d, i) => (m[d] = i, m), {});
  const sortedSeries = series.filter(s => !UI.trendMuted.has(s.bankId)).sort((a, b) => b.points.length - a.points.length);

  sortedSeries.forEach(s => {
    const color = (STATE.banks[s.bankId] || {}).color || '#2563eb';
    const seriesG = elNS('g', { class: 'series' });
    const sorted = s.points.slice().sort((a, b) => a.x.localeCompare(b.x));

    if (sorted.length < 2) {
      if (sorted.length === 1) {
        const p = sorted[0];
        const c = elNS('circle', { cx: xScale(idx[p.x]), cy: yScale(p.y), r: 5, fill: color, stroke: '#fff', 'stroke-width': 1.5, style: 'cursor: pointer', 'data-default-r': '5' });
        addLineHover(c, s, p, tooltip, color);
        seriesG.appendChild(c);
      }
    } else {
      const pathD = sorted.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xScale(idx[p.x])} ${yScale(p.y)}`).join(' ');
      seriesG.appendChild(elNS('path', { d: pathD, stroke: color, 'stroke-width': 2, 'stroke-linecap': 'round', 'stroke-linejoin': 'round', fill: 'none' }));
      sorted.forEach(p => {
        const c = elNS('circle', { cx: xScale(idx[p.x]), cy: yScale(p.y), r: 4, fill: color, stroke: '#fff', 'stroke-width': 1.5, style: 'cursor: pointer', 'data-default-r': '4' });
        addLineHover(c, s, p, tooltip, color);
        seriesG.appendChild(c);
      });
    }
    svg.appendChild(seriesG);
  });

  // 悬停辅助
  function addLineHover(circle, s, point, tooltip, color) {
    circle.addEventListener('mouseenter', (e) => {
      circle.setAttribute('r', '8');
      const prev = s.points.slice().sort((a, b) => a.x.localeCompare(b.x));
      const ci = prev.findIndex(p => p.x === point.x);
      const change = ci > 0 ? point.y - prev[ci - 1].y : null;
      tooltip.innerHTML = `<div style="font-weight:600;margin-bottom:6px;font-size:14px;">${s.shortName || s.bankName}</div><div style="color:#94a3b8;margin-bottom:8px;">${point.x}</div><div style="display:flex;align-items:baseline;gap:8px;"><span style="font-size:20px;font-weight:700;color:${color}">${fmtPct(point.y)}</span>${change !== null ? `<span style="font-size:12px;color:${change >= 0 ? '#4ade80' : '#f87171'}">${change >= 0 ? '\u2191' : '\u2193'} ${Math.abs(change * 100).toFixed(2)}bp</span>` : ''}</div>`;
      tooltip.style.display = 'block'; tooltip.style.opacity = '1';
      updatePos(e, tooltip);
    });
    circle.addEventListener('mousemove', (e) => updatePos(e, tooltip));
    circle.addEventListener('mouseleave', () => {
      circle.setAttribute('r', circle.getAttribute('data-default-r'));
      tooltip.style.opacity = '0'; tooltip.style.display = 'none';
    });
  }
  function updatePos(e, tooltip) {
    const rect = tooltip.getBoundingClientRect();
    let left = e.clientX + 15, top = e.clientY - 10;
    if (left + rect.width > window.innerWidth) left = e.clientX - rect.width - 15;
    if (top + rect.height > window.innerHeight) top = e.clientY - rect.height - 10;
    tooltip.style.left = left + 'px'; tooltip.style.top = top + 'px';
  }

  container.appendChild(svg);
  const origRemove = container.remove.bind(container);
  container.remove = () => { tooltip.remove(); origRemove(); };
  return container;
}

/** 期限结构对比折线散点图：横轴=期限，纵轴=利率，每家银行一条线+散点，悬浮看详情 */
function drawTermComparison(tenors, banks, currency) {
  const W = 960, H = 340, PL = 60, PR = 20, PT = 20, PB = 58;
  const n = tenors.length;
  if (n === 0) return el('div', { class: 'empty' }, '当前币种无有效期限数据');
  // 收集所有有数据的点计算 Y 范围
  let allY = [];
  for (const b of banks) {
    for (let i = 0; i < n; i++) {
      if (b.pts[i] !== null) allY.push(b.pts[i]);
    }
  }
  if (!allY.length) return el('div', { class: 'empty' }, '当前币种下暂无有效利率');
  const yMin = Math.max(0, Math.min(...allY) - 0.0005);
  const yMax = Math.max(...allY) + 0.0005;
  const pad = yMax - yMin < 0.001 ? 0.0005 : 0;
  const yLo = Math.max(0, yMin - pad), yHi = yMax + pad;
  const xScale = (i) => PL + (i / Math.max(n - 1, 1)) * (W - PL - PR);
  const yScale = (v) => PT + (1 - (v - yLo) / Math.max(yHi - yLo, 1e-9)) * (H - PT - PB);

  // 创建容器 + 悬停提示框
  const container = el('div', { style: { position: 'relative' } });
  const tooltip = el('div', {
    id: 'termCompTooltip',
    style: {
      position: 'fixed', background: 'rgba(15, 23, 42, 0.95)', color: '#fff',
      padding: '10px 14px', borderRadius: '6px', fontSize: '12px',
      pointerEvents: 'none', opacity: '0', transition: 'opacity 0.15s',
      zIndex: '1000', maxWidth: '220px', display: 'none'
    }
  });
  container.appendChild(tooltip);

  const svg = elNS('svg', { class: 'chart', viewBox: `0 0 ${W} ${H}`, preserveAspectRatio: 'none', style: { height: '340px' } });

  // 网格 + Y轴标签
  const gridG = elNS('g', { class: 'grid' });
  const ticks = 5;
  for (let k = 0; k <= ticks; k++) {
    const v = yLo + (yHi - yLo) * (k / ticks);
    const yp = yScale(v);
    gridG.appendChild(elNS('line', { x1: PL, x2: W - PR, y1: yp, y2: yp, stroke: '#e2e8f0', 'stroke-width': k === ticks ? 1.5 : 0.5, 'stroke-dasharray': k === ticks ? 'none' : '4,4' }));
    gridG.appendChild(elNS('text', { x: PL - 8, y: yp + 4, 'text-anchor': 'end', fill: '#64748b', 'font-size': '11', 'font-family': 'var(--mono)' }, fmtPct(v, 2)));
  }
  svg.appendChild(gridG);
  // X轴 + 期限标签
  const ax = elNS('g', { class: 'axis' });
  ax.appendChild(elNS('line', { x1: PL, x2: W - PR, y1: H - PB + 20, y2: H - PB + 20, stroke: '#cbd5e1', 'stroke-width': 1.5 }));
  for (let i = 0; i < n; i++) {
    ax.appendChild(elNS('text', { x: xScale(i), y: H - PB + 38, 'text-anchor': 'middle', fill: '#475569', 'font-size': '12', 'font-family': 'var(--mono)' }, tenors[i]));
  }
  svg.appendChild(ax);

  // 每家银行一条折线 + 散点（悬浮显示详情）
  for (const b of banks) {
    const color = (STATE.banks[b.bankId] || {}).color || '#2563eb';
    const seriesG = elNS('g', { class: 'series' });
    const pts = [];
    for (let i = 0; i < n; i++) {
      if (b.pts[i] !== null) pts.push([xScale(i), yScale(b.pts[i]), tenors[i], b.pts[i], i]);
    }
    if (pts.length >= 2) {
      const pathD = pts.map(([x, y], j) => `${j === 0 ? 'M' : 'L'} ${x} ${y}`).join(' ');
      seriesG.appendChild(elNS('path', { d: pathD, stroke: color, 'stroke-width': 2, fill: 'none', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));
    }
    for (const [cx, cy, t, v, i] of pts) {
      const c = elNS('circle', { cx, cy, r: 5, fill: color, stroke: '#fff', 'stroke-width': 2, style: 'cursor: pointer', 'data-default-r': '5' });
      c.appendChild(elNS('title', {}, `${b.shortName || b.bankName} · ${t}: ${fmtPct(v)}`));
      // 悬停交互
      c.addEventListener('mouseenter', (e) => {
        c.setAttribute('r', '9');
        tooltip.innerHTML = `<div style="font-weight: 600; margin-bottom: 4px; font-size: 14px;">${b.shortName || b.bankName}</div><div style="color: #94a3b8; margin-bottom: 6px;">${t} · ${currency}</div><div style="font-size: 20px; font-weight: 700; color: ${color}">${fmtPct(v)}</div>`;
        tooltip.style.display = 'block'; tooltip.style.opacity = '1';
        const rect = tooltip.getBoundingClientRect();
        let left = e.clientX + 15, top = e.clientY - 10;
        if (left + rect.width > window.innerWidth) left = e.clientX - rect.width - 15;
        if (top + rect.height > window.innerHeight) top = e.clientY - rect.height - 10;
        tooltip.style.left = left + 'px'; tooltip.style.top = top + 'px';
      });
      c.addEventListener('mousemove', (e) => {
        const rect = tooltip.getBoundingClientRect();
        let left = e.clientX + 15, top = e.clientY - 10;
        if (left + rect.width > window.innerWidth) left = e.clientX - rect.width - 15;
        if (top + rect.height > window.innerHeight) top = e.clientY - rect.height - 10;
        tooltip.style.left = left + 'px'; tooltip.style.top = top + 'px';
      });
      c.addEventListener('mouseleave', () => {
        c.setAttribute('r', c.getAttribute('data-default-r'));
        tooltip.style.opacity = '0'; tooltip.style.display = 'none';
      });
      seriesG.appendChild(c);
    }
    svg.appendChild(seriesG);
  }

  container.appendChild(svg);
  // 清理 hook
  const origRemove = container.remove.bind(container);
  container.remove = () => { tooltip.remove(); origRemove(); };
  return container;
}

function buildLegend(series, onToggle) {
  const legend = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '10px', padding: '10px 14px', marginTop: '8px', alignItems: 'center' } });
  
  // 标签
  legend.appendChild(el('span', { style: { fontSize: '12px', color: '#64748b', fontWeight: '500' } }, '筛选：'));
  
  // 全选按钮
  const toggleAllBtn = el('button', {
    class: 'btn sm',
    style: { marginRight: '8px' },
    onclick: () => {
      if (series.every(s => !UI.trendMuted.has(s.bankId))) {
        series.forEach(s => UI.trendMuted.add(s.bankId));
      } else {
        series.forEach(s => UI.trendMuted.delete(s.bankId));
      }
      if (onToggle) onToggle();
    }
  }, series.every(s => !UI.trendMuted.has(s.bankId)) ? '全部取消' : '全选');
  legend.appendChild(toggleAllBtn);
  
  // 按名称排序
  const sorted = [...series].sort((a, b) => (a.shortName || a.bankName || '').localeCompare(b.shortName || b.bankName || ''));
  
  sorted.forEach(s => {
    const color = (STATE.banks[s.bankId] || {}).color || '#2563eb';
    const muted = UI.trendMuted.has(s.bankId);
    
    const item = el('button', {
      class: 'btn sm',
      style: {
        borderLeft: `3px solid ${muted ? '#cbd5e1' : color}`,
        paddingLeft: '10px',
        opacity: muted ? '0.5' : '1'
      },
      onclick: () => {
        if (UI.trendMuted.has(s.bankId)) {
          UI.trendMuted.delete(s.bankId);
        } else {
          UI.trendMuted.add(s.bankId);
        }
        if (onToggle) onToggle();
      }
    }, s.shortName || s.bankName);
    
    legend.appendChild(item);
  });
  
  // 统计

function buildTrendTable(dates, series) {
  const card = el('div', { class: 'card', style: { marginTop: '16px' } });
  card.appendChild(el('div', { class: 'card-header' }, [el('h3', {}, '历史数据 · 表格'), el('span', { class: 'sub' }, '可对照阅读，每行一家银行')]));
  if (!allY.length) return el('div', { class: 'empty' }, '当前币种下暂无有效利率');
  
  // 排序计算Y轴范围（去掉极端值）
  allY.sort((a, b) => a - b);
  const yMin = Math.max(0, allY[0] - 0.002);
  const yMax = allY[allY.length - 1] + 0.002;
  
  // 找出每个期限的最佳利率
  const bestRates = [];
  for (let ti = 0; ti < n; ti++) {
    let best = null, bestRate = -Infinity;
    for (const b of banks) {
      if (b.pts[ti] !== null && b.pts[ti] > bestRate) {
        bestRate = b.pts[ti];
        best = b;
      }
    }
    bestRates.push(best ? { bank: best, rate: bestRate } : null);
  }
  
  // 创建主容器
  const wrapper = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '16px' } });
  
  // 银行筛选区
  const filterBar = el('div', { style: { 
    display: 'flex', flexWrap: 'wrap', gap: '8px', 
    padding: '12px 16px', background: '#f8fafc', borderRadius: '8px', 
    border: '1px solid #e2e8f0', alignItems: 'center' 
  }});
  filterBar.appendChild(el('span', { style: { fontSize: '13px', color: '#64748b', fontWeight: '500' } }, '显示银行：'));
  
  const visibleBanks = new Set(banks.map(b => b.bankId));
  
  // 全选/取消按钮
  const toggleAllBtn = el('button', { 
    class: 'btn sm', 
    style: { marginRight: '8px' },
    onclick: () => {
      const allVisible = banks.every(b => visibleBanks.has(b.bankId));
      if (allVisible) {
        visibleBanks.clear();
      } else {
        banks.forEach(b => visibleBanks.add(b.bankId));
      }
      renderCharts();
    }
  }, '全选');
  filterBar.appendChild(toggleAllBtn);
  
  banks.forEach(b => {
    const color = (STATE.banks[b.bankId] || {}).color || '#2563eb';
    const btn = el('button', {
      class: 'btn sm',
      style: { 
        borderLeft: `3px solid ${color}`,
        paddingLeft: '10px',
        opacity: visibleBanks.has(b.bankId) ? '1' : '0.4'
      },
      onclick: () => {
        if (visibleBanks.has(b.bankId)) {
          visibleBanks.delete(b.bankId);
          btn.style.opacity = '0.4';
        } else {
          visibleBanks.add(b.bankId);
          btn.style.opacity = '1';
        }
        renderCharts();
      }
    }, b.shortName || b.bankName);
    filterBar.appendChild(btn);
  });
  wrapper.appendChild(filterBar);
  
  // 图表区域
  const chartContainer = el('div', { style: { display: 'flex', gap: '16px', overflowX: 'auto', padding: '8px 0' } });
  wrapper.appendChild(chartContainer);
  
  // 悬停提示框
  const tooltip = el('div', { 
    id: 'scatterTooltip',
    style: {
      position: 'fixed',
      background: 'rgba(15, 23, 42, 0.95)',
      color: '#fff',
      padding: '10px 14px',
      borderRadius: '8px',
      fontSize: '12px',
      pointerEvents: 'none',
      opacity: '0',
      transition: 'opacity 0.15s',
      zIndex: '1000',
      boxShadow: '0 4px 12px rgba(0,0,0,0.15)',
      maxWidth: '200px'
    }
  });
  document.body.appendChild(tooltip);
  
  function renderCharts() {
    chartContainer.innerHTML = '';
    
    // 过滤可见银行的数据
    const visibleBankData = banks.filter(b => visibleBanks.has(b.bankId));
    if (visibleBankData.length === 0) {
      chartContainer.appendChild(el('div', { class: 'empty', style: { padding: '40px', textAlign: 'center' } }, '请选择要显示的银行'));
      return;
    }
    
    // 为每个期限创建一个独立的散点图
    for (let ti = 0; ti < n; ti++) {
      const tenor = tenors[ti];
      const W = 160, H = 260, PL = 55, PR = 25, PT = 25, PB = 45;
      
      const yScale = (v) => PT + (1 - (v - yMin) / Math.max(yMax - yMin, 1e-9)) * (H - PT - PB);
      
      const svg = elNS('svg', { 
        class: 'chart', 
        viewBox: `0 0 ${W} ${H}`, 
        style: { width: W + 'px', height: H + 'px', minWidth: W + 'px' }
      });
      
      // 背景渐变
      const defs = elNS('defs');
      defs.innerHTML = `
        <linearGradient id="bg-${ti}" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#fafbfc;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
        </linearGradient>
      `;
      svg.appendChild(defs);
      
      // 背景矩形
      svg.appendChild(elNS('rect', { x: PL, y: PT, width: W - PL - PR, height: H - PT - PB, fill: `url(#bg-${ti})`, rx: '4' }));
      
      // Y轴网格线
      const gridG = elNS('g', { class: 'grid' });
      const ticks = 5;
      for (let k = 0; k <= ticks; k++) {
        const v = yMin + (yMax - yMin) * (k / ticks);
        const yp = yScale(v);
        gridG.appendChild(elNS('line', { x1: PL, x2: W - PR, y1: yp, y2: yp, stroke: '#e2e8f0', 'stroke-width': k === ticks ? 1.5 : 0.5, 'stroke-dasharray': k === ticks ? 'none' : '3,3' }));
        gridG.appendChild(elNS('text', { x: PL - 8, y: yp + 4, 'text-anchor': 'end', fill: '#64748b', 'font-size': '10', 'font-family': 'var(--mono)' }, fmtPct(v, 2)));
      }
      svg.appendChild(gridG);
      
      // 期限标签
      const titleLabel = elNS('text', { x: W / 2, y: H - 10, 'text-anchor': 'middle', fill: '#0f172a', 'font-size': '14', 'font-weight': '600' }, tenor);
      svg.appendChild(titleLabel);
      
      // 计算该期限的最佳利率
      let bestInTenor = null;
      for (const b of visibleBankData) {
        if (b.pts[ti] !== null) {
          if (!bestInTenor || b.pts[ti] > bestInTenor.rate) {
            bestInTenor = { bank: b, rate: b.pts[ti] };
          }
        }
      }
      
      // 绘制该期限下所有银行的点
      const centerX = (PL + W - PR) / 2;
      const points = [];
      
      for (const b of visibleBankData) {
        const rate = b.pts[ti];
        if (rate === null) continue;
        
        points.push({ bank: b, rate });
      }
      
      // 按利率排序，最佳的在最上面（y值小）
      points.sort((a, b) => b.rate - a.rate);
      
      // 计算点的位置，避免重叠
      const pointSpacing = 14;
      const totalHeight = (points.length - 1) * pointSpacing;
      const startY = (H - PT - PB) / 2 - totalHeight / 2 + PT;
      
      points.forEach((p, idx) => {
        const b = p.bank;
        const rate = p.rate;
        const color = (STATE.banks[b.bankId] || {}).color || '#2563eb';
        const isBest = bestInTenor && bestInTenor.bank.bankId === b.bankId;
        
        const cy = yScale(rate);
        // 小幅水平偏移避免完全重叠
        const jitter = (idx % 3 - 1) * 6;
        const cx = centerX + jitter;
        
        // 外发光效果（最佳利率）
        if (isBest) {
          const glow = elNS('circle', { cx, cy, r: 14, fill: color, opacity: '0.15' });
          svg.appendChild(glow);
        }
        
        // 主圆点
        const c = elNS('circle', { 
          cx, cy, 
          r: isBest ? 9 : 7, 
          fill: color, 
          stroke: isBest ? '#fff' : '#fff', 
          'stroke-width': isBest ? 2.5 : 2,
          style: 'cursor: pointer',
          'data-bank': b.shortName || b.bankName,
          'data-rate': fmtPct(rate),
          'data-best': isBest ? 'true' : 'false'
        });
        
        // 悬停事件
        c.addEventListener('mouseenter', (e) => {
          tooltip.innerHTML = `
            <div style="font-weight: 600; margin-bottom: 4px;">${b.shortName || b.bankName}</div>
            <div style="color: #94a3b8;">${tenor} · ${currency}</div>
            <div style="font-size: 18px; font-weight: 700; margin-top: 6px; color: ${color}">${fmtPct(rate)}</div>
            ${isBest ? '<div style="margin-top: 4px; color: #4ade80; font-size: 11px;">🏆 最高利率</div>' : ''}
          `;
          tooltip.style.opacity = '1';
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top = (e.clientY - 10) + 'px';
          c.setAttribute('r', isBest ? 11 : 9);
        });
        
        c.addEventListener('mousemove', (e) => {
          tooltip.style.left = (e.clientX + 12) + 'px';
          tooltip.style.top = (e.clientY - 10) + 'px';
        });
        
        c.addEventListener('mouseleave', () => {
          tooltip.style.opacity = '0';
          c.setAttribute('r', isBest ? 9 : 7);
        });
        
        svg.appendChild(c);
        
        // 最佳利率标记
        if (isBest) {
          const star = elNS('text', { x: cx, y: cy + 4, 'text-anchor': 'middle', fill: '#fff', 'font-size': '10', 'font-weight': '700', style: 'pointer-events: none' }, '★');
          svg.appendChild(star);
        }
      });
      
      chartContainer.appendChild(svg);
    }
  }
  
  renderCharts();
  
  // 清理tooltip
  const originalRemove = wrapper.remove.bind(wrapper);
  wrapper.remove = () => {
    tooltip.remove();
    originalRemove();
  };
  
  return wrapper;
}

function elNS(tag, props = {}, children = []) {
  const node = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(props)) {
    if (v !== null && v !== undefined && v !== false) node.setAttribute(k, v);
  }
  for (const c of [].concat(children)) {
    if (c === null || c === undefined || c === false) continue;
    node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return node;
}

function exportSnapshotCsv(date) {
  const snap = STATE.snapshots[date];
  if (!snap) { toast('该日期无数据', 'err'); return; }
  const quotes = getQuotesByBank(date);
  const tenors = TENORS.map(t => t.code);
  const header = ['Bank', 'ShortName', 'Currency', ...tenors, 'ReceivedAt'];
  const rows = [header];
  for (const q of quotes) {
    for (const cur of CURRENCY_CODES) {
      const row = [q.bankName, q.shortName || '', cur];
      for (const t of tenors) {
        const r = rateOf(q, cur, t);
        row.push(r === null ? '' : (r * 100).toFixed(3));
      }
      row.push(q.receivedAt || '');
      // 行里至少要有一个值才记录
      if (row.slice(3, 3 + tenors.length).some(v => v !== '')) rows.push(row);
    }
  }
  // FX 单独一段
  rows.push([]);
  rows.push(['Bank', 'Pair', 'Side', 'Rate']);
  for (const q of quotes) for (const f of (q.fxRates || [])) rows.push([q.bankName, f.pair, f.side, f.rate]);
  const csv = rows.map(r => r.map(v => {
    const s = String(v ?? '');
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }).join(',')).join('\n');
  download(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' }), `deposit-rates-${date}.csv`);
  toast('已导出 CSV', 'ok');
}

function download(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 800);
}

function importAll(text) {
  try {
    const data = JSON.parse(text);
    if (!data || typeof data !== 'object') throw new Error('非 JSON 对象');
    if (!data.banks || !data.snapshots) throw new Error('缺少 banks / snapshots 字段');
    if (confirm(`导入将合并到当前数据（同 ID 覆盖）。包含 ${Object.keys(data.banks).length} 家银行、${Object.keys(data.snapshots).length} 个快照。继续？`)) {
      Object.assign(STATE.banks, data.banks);
      Object.assign(STATE.snapshots, data.snapshots);
      persist();
      renderCurrent();
      toast('已导入', 'ok');
    }
  } catch (e) {
    toast('导入失败：' + e.message, 'err');
  }
}

/* ===================== 11. 初始化 ===================== */

function init() {
  // 日期
  $('#dateSelector').value = UI.date;
  $('#dateSelector').addEventListener('change', (e) => {
    UI.date = e.target.value;
    renderCurrent();
  });
  // 顶栏按钮
  $('#btnSnapshot').addEventListener('click', () => {
    const snap = ensureSnapshot(UI.date);
    snap.updatedAt = new Date().toISOString();
    persist();
    toast(`快照 ${UI.date} 已保存`, 'ok');
    renderCurrent();
  });
  $('#btnExport').addEventListener('click', exportAll);
  $('#btnImportFile').addEventListener('click', () => $('#filePicker').click());
  $('#filePicker').addEventListener('change', (e) => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = () => importAll(reader.result);
    reader.readAsText(f);
    e.target.value = '';
  });
  // 标签切换
  $$('nav.tabs button[data-view]').forEach(b => b.addEventListener('click', () => setView(b.dataset.view)));
  // 首次空库 → 引导
  if (Object.keys(STATE.banks).length === 0) { /* using preloaded JSON data */ }
  renderCurrent();
}
